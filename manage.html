<!DOCTYPE html>
<html>
<head>
    <title>QC Management</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0e1013; color: white; margin: 0; }
        .navbar { background: #1c1f26; padding: 15px 30px; display: flex; justify-content: space-between; border-bottom: 2px solid #2ecc71; margin-bottom: 20px; }
        .nav-brand { font-size: 20px; font-weight: bold; color: #2ecc71; }
        .nav-links a { color: #888; text-decoration: none; margin-left: 20px; text-transform: uppercase; font-size: 13px; font-weight: bold; }
        .nav-links a.active { color: #2ecc71; }
        .container { display: flex; gap: 30px; justify-content: center; padding: 20px; flex-wrap: wrap; }
        .form-box { background: #1c1f26; padding: 25px; border-radius: 12px; border: 1px solid #333; width: 380px; }
        h3 { margin-top: 0; color: #2ecc71; border-bottom: 1px solid #333; padding-bottom: 10px; font-size: 18px; }
        input { width: 92%; padding: 12px; margin: 10px 0; border: 1px solid #333; border-radius: 6px; background: #2d333b; color: white; box-sizing: border-box; }
        button { background: #2ecc71; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 6px; width: 100%; font-weight: bold; margin-top: 10px; }
        button:hover { background: #27ae60; }
        .message { padding: 12px; border-radius: 6px; margin-bottom: 10px; text-align: center; }
        .success { background: #27ae60; color: white; }
        .error { background: #e74c3c; color: white; }
        .table-box { background: #1c1f26; padding: 25px; border-radius: 12px; border: 1px solid #333; width: 100%; max-width: 900px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #2d333b; padding: 12px; text-align: left; color: #2ecc71; border-bottom: 1px solid #333; }
        td { padding: 12px; border-bottom: 1px solid #333; }
        tr:hover { background: #2d333b; }
        .action-btn { padding: 6px 12px; margin-right: 5px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .edit-btn { background: #3498db; color: white; }
        .edit-btn:hover { background: #2980b9; }
        .delete-btn { background: #e74c3c; color: white; }
        .delete-btn:hover { background: #c0392b; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); }
        .modal-content { background: #1c1f26; margin: 5% auto; padding: 25px; border: 1px solid #333; border-radius: 12px; width: 90%; max-width: 400px; }
        .close { color: #888; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close:hover { color: white; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">HAMKO QC SYSTEM</div>
        <div class="nav-links">
            <a href="index.html">Monitor</a>
            <a href="manage.html" class="active">Management</a>
        </div>
    </nav>
    <div class="container">
        <div class="form-box">
            <h3>Scale Registration</h3>
            <div id="deviceMessage"></div>
            <form id="deviceForm">
                <input type="number" id="machine_no" name="machine_no" placeholder="Machine ID" required>
                <input type="text" id="location_name" name="location_name" placeholder="Floor Name" required>
                <button type="submit">Add New Machine</button>
            </form>
        </div>
        <div class="form-box">
            <h3>Product Specification</h3>
            <div id="productMessage"></div>
            <form id="productForm">
                <input type="text" id="item_name" name="item_name" placeholder="Product Name" required>
                <input type="number" step="0.01" id="std_weight" name="std_weight" placeholder="Standard Weight (g)" required>
                <input type="number" step="0.01" id="tolerance" name="tolerance" placeholder="Tolerance (+/- g)" required>
                <button type="submit" style="background: #3498db;">Save Product</button>
            </form>
        </div>
        <div class="form-box">
            <h3>ESP OTA Firmware</h3>
            <div id="otaMessage"></div>
            <form id="otaForm" enctype="multipart/form-data">
                <input type="file" id="firmware_bin" name="firmware_bin" accept=".bin" required>
                <input type="text" id="ota_version" name="version" placeholder="Firmware Version (e.g. 1.0.1)" required>
                <input type="number" id="ota_machine_no" name="machine_no" placeholder="Machine No (leave blank for global)">
                <input type="text" id="ota_notes" name="notes" placeholder="Release notes (optional)">
                <button type="submit" style="background: #9b59b6;">Upload Firmware</button>
            </form>
            <div id="otaCurrent" style="margin-top: 12px; color: #bbb; font-size: 13px;"></div>
        </div>
    </div>

    <div class="table-box" style="margin: 30px auto;">
        <h3>Products List</h3>
        <div id="productsMessage"></div>
        <table id="productsTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Product Name</th>
                    <th>Standard Weight (g)</th>
                    <th>Tolerance (g)</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="productsList">
                <tr><td colspan="5" style="text-align: center;">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <h3 style="color: #2ecc71;">Edit Product</h3>
            <form id="editForm">
                <input type="hidden" id="edit_id">
                <input type="text" id="edit_item_name" placeholder="Product Name" required>
                <input type="number" step="0.01" id="edit_std_weight" placeholder="Standard Weight (g)" required>
                <input type="number" step="0.01" id="edit_tolerance" placeholder="Tolerance (+/- g)" required>
                <button type="submit" style="background: #3498db;">Update Product</button>
            </form>
        </div>
    </div>

    <script>
        // Add Device Form
        document.getElementById('deviceForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            fetch('api.php?action=add_device', {
                method: 'POST',
                body: formData
            })
            .then(response => response.text().then(text => {
                try {
                    return JSON.parse(text);
                } catch(e) {
                    return {status: 'success'};
                }
            }))
            .then(data => {
                document.getElementById('deviceMessage').innerHTML = '<div class="message success">Machine added successfully!</div>';
                document.getElementById('deviceForm').reset();
                setTimeout(() => {
                    document.getElementById('deviceMessage').innerHTML = '';
                }, 3000);
            })
            .catch(error => {
                document.getElementById('deviceMessage').innerHTML = '<div class="message error">Error adding machine!</div>';
            });
        });

        // Add Product Form (AJAX)
        document.getElementById('productForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            fetch('api.php?action=add_item', {
                method: 'POST',
                body: formData
            })
            .then(response => response.text().then(text => {
                try {
                    return JSON.parse(text);
                } catch(e) {
                    return {status: 'success'};
                }
            }))
            .then(data => {
                if(data.status === 'success') {
                    document.getElementById('productMessage').innerHTML = '<div class="message success">Product added successfully!</div>';
                    document.getElementById('productForm').reset();
                    loadProducts();
                    setTimeout(() => {
                        document.getElementById('productMessage').innerHTML = '';
                    }, 3000);
                } else {
                    document.getElementById('productMessage').innerHTML = '<div class="message error">Error: ' + (data.message || 'Unknown error') + '</div>';
                }
            })
            .catch(error => {
                document.getElementById('productMessage').innerHTML = '<div class="message error">Error: ' + error.message + '</div>';
            });
        });

        // Load Products
        function loadProducts() {
            fetch('api.php?action=list_items')
            .then(response => response.json())
            .then(items => {
                const tbody = document.getElementById('productsList');
                if (items.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No products found</td></tr>';
                    return;
                }
                tbody.innerHTML = items.map(item => `
                    <tr>
                        <td>${item.id}</td>
                        <td>${item.name}</td>
                        <td>${item.standard_weight}</td>
                        <td>${item.tolerance}</td>
                        <td>
                            <button class="action-btn edit-btn" onclick="openEditModal(${item.id}, '${item.name}', ${item.standard_weight}, ${item.tolerance})">Edit</button>
                            <button class="action-btn delete-btn" onclick="deleteProduct(${item.id})">Delete</button>
                        </td>
                    </tr>
                `).join('');
            })
            .catch(error => {
                document.getElementById('productsMessage').innerHTML = '<div class="message error">Error loading products!</div>';
            });
        }

        // Open Edit Modal
        function openEditModal(id, name, stdWeight, tolerance) {
            document.getElementById('edit_id').value = id;
            document.getElementById('edit_item_name').value = name;
            document.getElementById('edit_std_weight').value = stdWeight;
            document.getElementById('edit_tolerance').value = tolerance;
            document.getElementById('editModal').style.display = 'block';
        }

        // Close Edit Modal
        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        // Edit Product Form
        document.getElementById('editForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('edit_id').value;
            const name = document.getElementById('edit_item_name').value;
            const stdWeight = document.getElementById('edit_std_weight').value;
            const tolerance = document.getElementById('edit_tolerance').value;
            
            fetch('api.php?action=edit_item', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: `id=${id}&item_name=${encodeURIComponent(name)}&std_weight=${stdWeight}&tolerance=${tolerance}`
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    document.getElementById('productsMessage').innerHTML = '<div class="message success">Product updated successfully!</div>';
                    closeEditModal();
                    loadProducts();
                    setTimeout(() => {
                        document.getElementById('productsMessage').innerHTML = '';
                    }, 3000);
                }
            })
            .catch(error => {
                document.getElementById('productsMessage').innerHTML = '<div class="message error">Error updating product!</div>';
            });
        });

        // Delete Product
        function deleteProduct(id) {
            if(confirm('Are you sure you want to delete this product?')) {
                fetch('api.php?action=delete_item&id=' + id, {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    if(data.status === 'success') {
                        document.getElementById('productsMessage').innerHTML = '<div class="message success">Product deleted successfully!</div>';
                        loadProducts();
                        setTimeout(() => {
                            document.getElementById('productsMessage').innerHTML = '';
                        }, 3000);
                    }
                })
                .catch(error => {
                    document.getElementById('productsMessage').innerHTML = '<div class="message error">Error deleting product!</div>';
                });
            }
        }

        // Upload OTA firmware
        document.getElementById('otaForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const machineValue = document.getElementById('ota_machine_no').value.trim();
            formData.set('machine_no', machineValue === '' ? '0' : machineValue);

            try {
                const res = await fetch('api.php?action=upload_firmware', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (data.status === 'success') {
                    const scopeText = data.scope === 'machine'
                        ? `Machine ${data.machine_no}`
                        : 'All machines';
                    document.getElementById('otaMessage').innerHTML =
                        `<div class="message success">Firmware uploaded (${scopeText}) - v${data.version}</div>`;
                    document.getElementById('otaForm').reset();
                    loadOtaManifest();
                } else {
                    document.getElementById('otaMessage').innerHTML =
                        `<div class="message error">${data.message || 'Firmware upload failed'}</div>`;
                }
            } catch (error) {
                document.getElementById('otaMessage').innerHTML =
                    `<div class="message error">Upload error: ${error.message}</div>`;
            }
        });

        async function loadOtaManifest() {
            try {
                const res = await fetch('api.php?action=ota_manifest');
                const manifest = await res.json();

                const globalEntry = manifest.global;
                const machineEntries = manifest.machines || {};

                let html = '';
                if (globalEntry && globalEntry.version) {
                    html += `<div>Global: v${globalEntry.version} (${globalEntry.file})</div>`;
                } else {
                    html += '<div>Global: no firmware configured</div>';
                }

                const machineKeys = Object.keys(machineEntries);
                if (machineKeys.length > 0) {
                    machineKeys.sort((a, b) => Number(a) - Number(b));
                    machineKeys.forEach(key => {
                        const m = machineEntries[key];
                        html += `<div>Machine ${key}: v${m.version} (${m.file})</div>`;
                    });
                } else {
                    html += '<div>Machine-specific: none</div>';
                }

                document.getElementById('otaCurrent').innerHTML = html;
            } catch (error) {
                document.getElementById('otaCurrent').innerHTML = '<div>OTA manifest unavailable</div>';
            }
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }

        // Load products on page load
        loadProducts();
        loadOtaManifest();
    </script>
</body>
</html>
